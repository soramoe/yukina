<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>CSS字体练习</title>
    <link rel="stylesheet" href="typography.css">
</head>
<body>
    <h1>字体排版练习</h1>

    <h2>1. 不同字体大小</h2>
    <p class="small">小号文字(14px)</p>
    <p class="normal">正常文字(16px)</p>
    <p class="large">大号文字(20px)</p>


    <h2>2. 不同字体粗细</h2>
    <p class="thin">细体文字(300)</p>
    <p class="normal">普通文字(400)</p>
    <p class="bold">粗体文字(700)</p>


    <h2>3. 不同行高</h2>
    <p class="line-tight">这是行高为1.2的文字，行与行之间比较紧凑，阅读起来稍微有点吃力</p>
    <p class="line-normal">这是行高为1.5多的文字，行与行之间有合适的距离，阅读起来很舒适。</p>
    <p class="line-loose">这是行高为2的文字,行与行之间距离很大,看起来有点松散。</p>


    <h2>4. 文字对齐</h2>
    <p class="align-left">这是左对齐的文字。</p>
    <p class="align-center">这是居中对齐的文字。</p>
    <p class="align-right">这是右对齐的文字。</p>


    <h2>5. 文字装饰</h2>
    <p class="underline">这是带下划线的文字。</p>
    <p class="line-through">这是带删除线的文字。</p>
</body>
</html>
