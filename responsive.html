<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>响应式设计练习</title>
    <link rel="stylesheet" href="responsive.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">我的网站</h1>
            <nav class="nav">
                <a href="#">首页</a>
                <a href="#">关于</a>
                <a href="#">文章</a>
                <a href="#">练习</a>
            </nav>
        </div>
    </header>


    <main class="main">
        <div class="container">
            <section class="hero">
                <h2>欢迎来到我的网站</h2>
                <p>这是一个响应式设计的演示页面</p>
            </section>

            <section class="cards">
                <div class="card">
                    <h3>卡片 1</h3>
                    <p>这是第一张卡片的内容，它会根据屏幕大小自动调整布局</p>
                </div>
                <div class="card">
                    <h3>卡片 2</h3>
                    <p>这是第二张卡片额内容，它会根据屏幕大小自动调整布局。</p>
                </div>
                <div class="card">
                    <h3>卡片 3</h3>
                    <p>这是第三张卡片的内容，它会根据屏幕大小自动调整布局。</p>
                </div>
                <div class="card">
                    <h3>卡片 4</h3>
                    <p>这是第四张卡片的内容，它会根据屏幕大小自动调整布局。</p>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="container">
                <p>&copy; 2024 我的网站. 版权所有.</p>
            </div>
        </div>
    </footer>
</body>
</html>
