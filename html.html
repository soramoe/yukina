<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <title>主人的第一个HTML网页</title>
  </head>
  <body>
    <h1>欢迎来到我的网页！</h1>
    <p>这是我用HTML创建的第一个网页。</p>
    
    <hr>
    
    <h2>我学到的HTML标签</h2>
    <ul>
      <li><h1> - <h6> 标题标签</li>
      <li><p> 段落标签</li>
      <li><br> 换行标签</li>
      <li><hr> 水平线标签</li>
      <li><strong> 和 <em> 文本样式</li>
      <li><ul> 和 <ol> 列表标签</li>
      <li><a> 链接标签</li>
      <li><img> 图片标签</li>
    </ul>
    
    <hr>
    
    <h2>练习链接</h2>
    <p>访问 <a href="https://hexo.io" target="_blank">Hexo官网</a></p>
    
    <h2>文本样式示例</h2>
    <p><strong>这是粗体，表示重要内容</strong></p>
    <p><em>这是斜体，表示强调内容</em></p>
    <p><u>这是下划线</u></p>
    <p><del>这是删除线</del></p>
  </body>
</html>
